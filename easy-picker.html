<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#111;color:#ddd;padding:1.5rem;max-width:1100px;margin:0 auto;line-height:1.5}
h1{font-size:1.8rem;color:#c9a84c;margin-bottom:0.25rem}
.subtitle{color:#888;margin-bottom:1rem;font-size:0.85rem}

.sticky-bar{position:sticky;top:0;background:#111;padding:0.75rem 0;z-index:10;border-bottom:1px solid #333;margin-bottom:1.5rem;display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center}
.sticky-bar button{padding:0.35rem 0.75rem;background:#222;color:#ddd;border:1px solid #444;border-radius:4px;cursor:pointer;font-size:0.78rem;font-family:inherit}
.sticky-bar button:hover{background:#333;border-color:#666}
.stats{margin-left:auto;font-size:0.85rem;color:#aaa;display:flex;gap:1.25rem}
.stats .n{color:#c9a84c;font-weight:700;font-size:1rem}

.legend{display:flex;flex-wrap:wrap;gap:1.5rem;margin-bottom:1.5rem;font-size:0.78rem;color:#888}
.legend span{display:flex;align-items:center;gap:0.35rem}
.sw{width:14px;height:14px;border-radius:3px;display:inline-block;border:2px solid}
.sw-suggested{background:transparent;border-color:#c9a84c}
.sw-flagged{background:transparent;border-color:#c0392b}
.sw-neutral{background:#1a1a1a;border-color:#252525}

.tag-section{margin-bottom:2rem}
.tag-head{display:flex;align-items:baseline;gap:0.75rem;margin-bottom:0.6rem;border-bottom:1px solid #2a2a2a;padding-bottom:0.4rem}
.tag-head h2{color:#c9a84c;font-size:1rem;text-transform:capitalize}
.tag-head .tc{color:#666;font-size:0.75rem}
.tag-head .ta{margin-left:auto;display:flex;gap:0.4rem}
.tag-head .ta button{padding:0.15rem 0.45rem;background:none;border:1px solid #333;color:#888;border-radius:3px;cursor:pointer;font-size:0.68rem;font-family:inherit}
.tag-head .ta button:hover{color:#c9a84c;border-color:#c9a84c}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0.4rem}
label.item{display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.65rem;border-radius:5px;background:#1a1a1a;border:2px solid #252525;cursor:pointer;transition:background 0.12s,border-color 0.12s}
label.item:hover{background:#222}
label.item.on{background:#1e2518;border-color:#3a5a2a}
label.item.suggested{border-color:#c9a84c}
label.item.suggested.on{border-color:#c9a84c;background:#2a2518}
label.item.flagged{border-color:#c0392b}
label.item.flagged.on{border-color:#c0392b;background:#2a1818}
label.item input{width:16px;height:16px;accent-color:#c9a84c;flex-shrink:0}
label.item .nm{flex:1;font-size:0.85rem}
label.item .df{font-size:0.65rem;padding:0.1rem 0.35rem;border-radius:3px;font-weight:600}
label.item .flag{font-size:0.6rem;padding:0.1rem 0.35rem;border-radius:3px;font-weight:600;background:#3a1a1a;color:#e74c3c;margin-left:0.25rem}
.d1{background:#1a3a1a;color:#6a6}.d2{background:#3a3a1a;color:#aa6}.d3{background:#3a1a1a;color:#a66}

.output{margin-top:2rem;border-top:2px solid #333;padding-top:1.5rem}
.output h2{color:#c9a84c;font-size:1.1rem;margin-bottom:0.6rem}
.output textarea{width:100%;height:180px;background:#0a0a0a;color:#ccc;border:1px solid #333;border-radius:6px;padding:0.75rem;font-family:Menlo,Consolas,monospace;font-size:0.75rem;resize:vertical}
.output button{margin-top:0.4rem;padding:0.5rem 1.5rem;background:#c9a84c;color:#111;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:0.85rem}
.output button:hover{background:#d4b35c}

.filter-bar{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
.filter-bar button{padding:0.3rem 0.6rem;background:#1a1a1a;color:#aaa;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:0.72rem;font-family:inherit}
.filter-bar button:hover,.filter-bar button.active{color:#c9a84c;border-color:#c9a84c}

@media(max-width:600px){.grid{grid-template-columns:1fr}.stats{margin-left:0;flex-basis:100%}}
</style>

<body>

<h1>F5 Easy Mode Picker</h1>
<p class="subtitle">Select ~50 universally accessible categories for Easy mode. Gold border = suggested. Red border = culturally specific (US sports, English lit, Western slang, etc.).</p>

<div class="legend">
  <span><span class="sw sw-suggested"></span> Suggested for Easy</span>
  <span><span class="sw sw-flagged"></span> Culturally specific</span>
  <span><span class="sw sw-neutral"></span> Neutral</span>
</div>

<div class="filter-bar">
  <button onclick="showAll()" class="active" id="fAll">Show All</button>
  <button onclick="showOnly('suggested')" id="fSugg">Suggested Only</button>
  <button onclick="showOnly('flagged')" id="fFlag">Flagged Only</button>
  <button onclick="showOnly('unchecked')" id="fUnch">Unchecked Only</button>
</div>

<div class="sticky-bar">
  <button onclick="selSuggested()">Select Suggested</button>
  <button onclick="selNone()">Deselect All</button>
  <div class="stats">
    <span>Selected: <span class="n" id="ct">0</span></span>
    <span>Total: <span class="n" id="tt">0</span></span>
  </div>
</div>

<div id="container"></div>

<div class="output">
  <h2>Easy Categories Array (paste back to me)</h2>
  <textarea id="out" readonly></textarea>
  <button onclick="copyOut()">Copy to Clipboard</button>
</div>

  'Baseball Players', 'Famous Coaches', 'NHL Teams', 'Stadiums & Arenas',
  // US-centric
  'U.S. Presidents', 'U.S. States', 'U.S. Cities', 'National Parks',
  'Civil Rights Leaders', 'Colleges & Universities',
  // English literature
  'Shakespeare Plays', 'Poets', 'Playwrights', 'Poetry Collections',
  // Western slang/idioms
  'GenX Slang', 'Baby Boomer Slang', 'Millennial Slang', 'Gen Z Slang',
  'Exclamations', 'Things Grandparents Say',
  // Western entertainment decades
  '60s Movies', '70s Movies', '60s Songs', '70s Songs',
  '60s Musical Artists', '70s Musical Artists',
  // Western entertainment specific
  'Broadway Musicals', 'Sitcoms', 'Game Shows',
  'Country Music Artists', 'Jazz Musicians', 'Comedians',
  "Children's TV Shows", '90s TV Shows',
  // Western high culture
  'Ballets', 'Sculptors', 'Composers', 'Philosophers',
  'Architecture Terminology', 'Design Terminology',
  'Art Terminology', 'Music Terminology',
  // Western-specific things
  'Crayon Colors', 'Dog Commands', 'Magazines', 'Newspapers',
  'College Majors', 'Legal Terms', 'Military Ranks',
  'Ancient Greek Figures',
]);

const sel = new Set();
// Pre-check suggested categories
C.forEach((c, i) => { if (SUGGESTED.has(c.n)) sel.add(i); });

const TAGS = ['nature','food','geography','entertainment','arts','history','science','sports','things','humor'];
const LABELS = {nature:'Nature',food:'Food & Drink',geography:'Geography',entertainment:'Entertainment',arts:'Arts & Letters',history:'History',science:'Science',sports:'Sports',things:'Things',humor:'Humor & Creative'};
const DIFF = ['','Easy','Med','Hard'];

let filterMode = 'all';

function render() {
  const box = document.getElementById('container');
  box.innerHTML = '';
  for (const tag of TAGS) {
    const items = C.map((c,i)=>({...c,i})).filter(c=>c.t===tag);
    if (!items.length) continue;

    const visible = items.filter(c => {
      if (filterMode === 'suggested') return SUGGESTED.has(c.n);
      if (filterMode === 'flagged') return FLAGGED.has(c.n);
      if (filterMode === 'unchecked') return !sel.has(c.i);
      return true;
    });
    if (!visible.length) continue;

    const selCount = items.filter(c=>sel.has(c.i)).length;
    const sec = document.createElement('div');
    sec.className = 'tag-section';
    sec.innerHTML = `<div class="tag-head"><h2>${LABELS[tag]}</h2><span class="tc">${selCount} / ${items.length}</span><div class="ta"><button onclick="tagAll('${tag}')">All</button><button onclick="tagNone('${tag}')">None</button></div></div>`;
    const g = document.createElement('div');
    g.className = 'grid';
    for (const c of visible) {
      const on = sel.has(c.i);
      const isSugg = SUGGESTED.has(c.n);
      const isFlag = FLAGGED.has(c.n);
      const lbl = document.createElement('label');
      lbl.className = `item${on?' on':''}${isSugg?' suggested':''}${isFlag?' flagged':''}`;
      let extra = '';
      if (isFlag) extra = '<span class="flag">cultural</span>';
      lbl.innerHTML = `<input type="checkbox" ${on?'checked':''} data-i="${c.i}"><span class="nm">${c.n}</span>${extra}<span class="df d${c.d}">${DIFF[c.d]}</span>`;
      lbl.querySelector('input').onchange = e => {
        if (e.target.checked) sel.add(c.i); else sel.delete(c.i);
        lbl.classList.toggle('on', e.target.checked);
        updStats();
        genOut();
      };
      g.appendChild(lbl);
    }
    sec.appendChild(g);
    box.appendChild(sec);
  }
  updStats();
  genOut();
}

function updStats() {
  document.getElementById('ct').textContent = sel.size;
  document.getElementById('tt').textContent = C.length;
}

function genOut() {
  const names = C.filter((_,i) => sel.has(i)).map(c => c.n);
  const js = `const EASY_CATEGORIES = new Set([\n${names.map(n => `  '${n.replace(/'/g,"\\'")}',`).join('\n')}\n]);`;
  document.getElementById('out').value = js;
}

function copyOut() {
  const ta = document.getElementById('out');
  ta.select();
  document.execCommand('copy');
  event.target.textContent = 'Copied!';
  setTimeout(() => event.target.textContent = 'Copy to Clipboard', 1500);
}

function selSuggested() { sel.clear(); C.forEach((c,i) => { if (SUGGESTED.has(c.n)) sel.add(i); }); render(); }
function selNone() { sel.clear(); render(); }
function tagAll(t) { C.forEach((c,i) => { if (c.t===t) sel.add(i); }); render(); }
function tagNone(t) { C.forEach((c,i) => { if (c.t===t) sel.delete(i); }); render(); }

function showAll() { filterMode = 'all'; setActiveFilter('fAll'); render(); }
function showOnly(mode) { filterMode = mode; setActiveFilter('f' + mode.charAt(0).toUpperCase() + mode.slice(1)); render(); }
function setActiveFilter(id) {
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  const map = { suggested: 'fSugg', flagged: 'fFlag', unchecked: 'fUnch' };
  document.getElementById(id).classList.add('active');
}

render();
</script>
</body>
</html>
